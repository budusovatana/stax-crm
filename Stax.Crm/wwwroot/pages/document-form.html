<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Добавить договор</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div id="topbar"></div>
    <div class="container-fluid px-4 py-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="mb-3">Добавить договор (PDF)</h2>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Инвестор</label>
                        <select class="form-select" id="investorId"></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Тип документа</label>
                        <select class="form-select" id="docType">
                            <option value="CONTRACT">Договор</option>
                            <option value="ADD_AGREEMENT">Доп. соглашение</option>
                            <option value="OTHER">Другое</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Номер договора (опц.)</label>
                        <input class="form-control" id="contractNo" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Дата договора (опц.)</label>
                        <input class="form-control" id="contractDate" type="date" />
                    </div>
                    <div class="col-12">
                        <label class="form-label">PDF файл</label>
                        <input class="form-control" id="file" type="file" accept="application/pdf" />
                    </div>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-warning" id="btnSave"><i data-lucide="upload"></i> Загрузить</button>
                    <a class="btn btn-outline-secondary" href="/pages/documents.html"><i data-lucide="arrow-left"></i> Назад</a>
                </div>
                <div id="error" class="alert alert-danger mt-3"></div>
            </div>
        </div>
    </div>
    <script src="/lib/bootstrap.bundle.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
    <script src="/lib/motion.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui-maps.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/document-form.js"></script>
</body>
</html>
