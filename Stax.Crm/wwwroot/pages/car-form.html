<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Машина</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div id="topbar"></div>
    <div class="container-fluid px-4 py-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="mb-3" id="title">Добавление машины</h2>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Марка/модель *</label>
                        <input class="form-control" id="makeModel" list="makeModelList" placeholder="Haval F7" />
                        <datalist id="makeModelList"></datalist>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Госномер *</label>
                        <input class="form-control" id="plateNumber" placeholder="А123ВС77" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">VIN</label>
                        <input class="form-control" id="vin" placeholder="VIN..." />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">СТС</label>
                        <input class="form-control" id="stsNumber" placeholder="STS-001" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Лизинговая компания</label>
                        <div class="row-inline">
                            <select class="form-select" id="ownerId" style="flex:1">
                                <option value="">— не выбрано —</option>
                            </select>
                            <button class="btn btn-outline-secondary" id="btnAddOwner" type="button" title="Добавить лизинговую компанию">+</button>
                        </div>
                        <div id="ownerHint" class="hint" style="display:none"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Цвет *</label>
                        <select class="form-select" id="color">
                            <option value="WHITE">Белый</option>
                            <option value="YELLOW">Жёлтый</option>
                            <option value="WHITE_YELLOW">Белый/Жёлтый</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Год</label>
                        <input class="form-control" id="year" type="number" placeholder="2023" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Пробег (км)</label>
                        <input class="form-control" id="mileageKm" type="text" placeholder="45 000" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">ДТП *</label>
                        <select class="form-select" id="hasAccident">
                            <option value="false">Нет</option>
                            <option value="true">Да</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Стоимость *</label>
                        <input class="form-control" id="carPrice" type="text" placeholder="1 200 000" />
                    </div>
                    <div class="col-12">
                        <label class="form-label">Комментарий</label>
                        <textarea class="form-control" id="comment" rows="3"></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-warning" id="btnSave" type="button"><i data-lucide="save"></i> Сохранить</button>
                    <a class="btn btn-outline-secondary" href="/pages/cars.html"><i data-lucide="arrow-left"></i> Назад</a>
                </div>
                <div id="error" class="alert alert-danger mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>
    <script src="/lib/bootstrap.bundle.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
    <script src="/lib/motion.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui-maps.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/car-form.js"></script>
</body>
</html>
