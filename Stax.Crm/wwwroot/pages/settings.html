<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STAX CRM - Настройки</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>

<div id="topbar"></div>

<div class="container-fluid px-4 py-3">
    <h1 class="mb-4">Настройки</h1>

    <div class="row g-4 settings-grid">
        <!-- Тема -->
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Тема оформления</h5>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary d-flex align-items-center gap-2" id="themeLight" onclick="setTheme('light')">
                            <i data-lucide="sun"></i> Светлая
                        </button>
                        <button class="btn btn-outline-secondary d-flex align-items-center gap-2" id="themeDark" onclick="setTheme('dark')">
                            <i data-lucide="moon"></i> Тёмная
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Навигация -->
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Расположение навигации</h5>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary d-flex align-items-center gap-2" id="navTop" onclick="setNavMode('top')">
                            <i data-lucide="panel-top"></i> Сверху
                        </button>
                        <button class="btn btn-outline-secondary d-flex align-items-center gap-2" id="navSide" onclick="setNavMode('side')">
                            <i data-lucide="panel-left"></i> Слева
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Смена пароля -->
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Смена пароля</h5>
                    <div class="row g-3" style="max-width:480px;">
                        <div class="col-12">
                            <label class="form-label">Текущий пароль</label>
                            <div class="password-wrap">
                                <input class="form-control" id="curPassword" type="password" placeholder="Введите текущий пароль" />
                                <span class="toggle-password"><i data-lucide="eye"></i></span>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Новый пароль</label>
                            <div class="password-wrap">
                                <input class="form-control" id="newPassword" type="password" placeholder="Минимум 8: буквы + цифры + символ" />
                                <span class="toggle-password"><i data-lucide="eye"></i></span>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Повторите новый пароль</label>
                            <div class="password-wrap">
                                <input class="form-control" id="newPassword2" type="password" placeholder="Повторите новый пароль" />
                                <span class="toggle-password"><i data-lucide="eye"></i></span>
                            </div>
                        </div>
                        <div class="col-12">
                            <button class="btn btn-warning d-flex align-items-center gap-2" id="btnChangePassword" type="button">
                                <i data-lucide="key-round"></i> Сменить пароль
                            </button>
                            <div id="pwdStatus" class="mt-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Тестовые данные (только для админов) -->
        <div class="col-12" id="seedCard" data-admin-only style="display:none;">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Тестовые данные</h5>
                    <p class="text-muted mb-3">Заполнить базу имитационными данными за последние 45 дней для тестирования.</p>
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-outline-success d-flex align-items-center gap-2" id="btnSeed" onclick="seedDemo()">
                            <i data-lucide="database"></i> Заполнить тестовыми данными
                        </button>
                        <button class="btn btn-outline-danger d-flex align-items-center gap-2" id="btnClearSeed" onclick="clearDemo()">
                            <i data-lucide="trash-2"></i> Удалить тестовые данные
                        </button>
                    </div>
                    <div id="seedStatus" class="mt-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/lib/bootstrap.bundle.min.js"></script>
<script src="/lib/lucide.min.js"></script>
<script src="/lib/motion.js"></script>
<script src="/js/animations.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui-maps.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/topbar.js"></script>
<script src="/js/router.js"></script>
<script src="/js/settings.js"></script>
</body>
</html>
