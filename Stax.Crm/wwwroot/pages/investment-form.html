<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Инвестиция</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div id="topbar"></div>
    <div class="container-fluid px-4 py-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="mb-3" id="title">Инвестиция</h2>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Инвестор</label>
                        <select class="form-select" id="investorId"></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Машина</label>
                        <select class="form-select" id="carId"></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Сумма</label>
                        <input class="form-control" id="principalAmount" type="text" placeholder="1 000 000" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Процент</label>
                        <input class="form-control" id="interestRatePercent" type="number" step="0.0001" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Дата начала</label>
                        <input class="form-control" id="startDate" type="date" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Срок (мес.)</label>
                        <input class="form-control" id="termMonths" type="number" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Тип выплат</label>
                        <select class="form-select" id="payoutType">
                            <option value="MONTHLY">Ежемесячно</option>
                            <option value="QUARTERLY">Ежеквартально</option>
                            <option value="END_OF_TERM">В конце срока</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Статус</label>
                        <select class="form-select" id="status">
                            <option value="ACTIVE">Активная</option>
                            <option value="CLOSED">Закрыта</option>
                            <option value="CANCELED">Отменена</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-warning" id="btnSave"><i data-lucide="save"></i> Сохранить</button>
                    <a class="btn btn-outline-secondary" id="backBtn" href="/pages/investments.html"><i data-lucide="arrow-left"></i> Назад</a>
                </div>
                <div id="error" class="alert alert-danger mt-3"></div>
            </div>
        </div>
    </div>
    <script src="/lib/bootstrap.bundle.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
    <script src="/lib/motion.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui-maps.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/investment-form.js"></script>
</body>
</html>
