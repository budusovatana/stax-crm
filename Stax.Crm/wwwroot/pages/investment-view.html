<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Инвестиция — STAX</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div id="topbar"></div>
    <div class="container-fluid px-4 py-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="mb-0" id="title">Инвестиция</h2>
                    <div class="d-flex gap-2">
                        <a class="btn btn-outline-secondary" id="backBtn" href="/pages/investments.html"><i data-lucide="arrow-left"></i> Назад</a>
                        <a class="btn btn-warning" id="editBtn" href="#"><i data-lucide="pencil"></i> Редактировать</a>
                    </div>
                </div>

                <div class="kv-grid mb-3">
                    <div class="kv-item"><div class="kv-label">Инвестор</div><div class="kv-value" id="investor"></div></div>
                    <div class="kv-item"><div class="kv-label">Машина</div><div class="kv-value" id="car"></div></div>
                    <div class="kv-item"><div class="kv-label">Сумма</div><div class="kv-value" id="principal"></div></div>
                    <div class="kv-item"><div class="kv-label">Процент</div><div class="kv-value" id="rate"></div></div>
                    <div class="kv-item"><div class="kv-label">Дата начала</div><div class="kv-value" id="startDate"></div></div>
                    <div class="kv-item"><div class="kv-label">Срок</div><div class="kv-value" id="term"></div></div>
                    <div class="kv-item"><div class="kv-label">Тип выплат</div><div class="kv-value" id="ptype"></div></div>
                    <div class="kv-item"><div class="kv-label">Возврат</div><div class="kv-value" id="total"></div></div>
                </div>

                <hr />
                <h3 class="h5 mb-3">График выплат</h3>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead><tr><th>№</th><th>Дата</th><th>Сумма</th><th>Статус</th><th>Действие</th></tr></thead>
                        <tbody id="sched"></tbody>
                    </table>
                </div>
                <div id="error" class="alert alert-danger mt-3"></div>
            </div>
        </div>
    </div>
    <script src="/lib/bootstrap.bundle.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
    <script src="/lib/motion.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui-maps.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/investment-view.js"></script>
</body>
</html>
