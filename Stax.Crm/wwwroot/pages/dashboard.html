<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STAX CRM - Главная</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>

<div id="topbar"></div>

<div class="container-fluid px-4 py-3">
    <h1 class="mb-4" id="greeting"></h1>

    <div class="dashboard-cards">
        <div class="card dash-card dash-card--amber">
            <div class="card-body">
                <div class="dash-top">
                    <div class="dash-icon"><i data-lucide="users"></i></div>
                    <div class="dash-info">
                        <div class="dash-label">Инвесторов</div>
                        <div class="dash-value" id="investorsCount">—</div>
                    </div>
                </div>
                <canvas class="dash-sparkline" data-spark="investors"></canvas>
            </div>
        </div>
        <div class="card dash-card dash-card--blue">
            <div class="card-body">
                <div class="dash-top">
                    <div class="dash-icon"><i data-lucide="car"></i></div>
                    <div class="dash-info">
                        <div class="dash-label">Автомобилей</div>
                        <div class="dash-value" id="carsCount">—</div>
                    </div>
                </div>
                <canvas class="dash-sparkline" data-spark="cars"></canvas>
            </div>
        </div>
        <div class="card dash-card dash-card--green">
            <div class="card-body">
                <div class="dash-top">
                    <div class="dash-icon"><i data-lucide="trending-up"></i></div>
                    <div class="dash-info">
                        <div class="dash-label">Активных инвестиций</div>
                        <div class="dash-value" id="activeInvestments">—</div>
                    </div>
                </div>
                <canvas class="dash-sparkline" data-spark="investments"></canvas>
            </div>
        </div>
        <div class="card dash-card dash-card--purple">
            <div class="card-body">
                <div class="dash-top">
                    <div class="dash-icon"><i data-lucide="banknote"></i></div>
                    <div class="dash-info">
                        <div class="dash-label">Выплат за месяц</div>
                        <div class="dash-value" id="monthPayments">—</div>
                    </div>
                </div>
                <canvas class="dash-sparkline" data-spark="payments"></canvas>
            </div>
        </div>
    </div>

    <h2 class="mt-4 mb-3">Ближайшие выплаты</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Инвестор</th>
                        <th class="text-end">Сумма, &#8381;</th>
                    </tr>
                </thead>
                <tbody id="upcomingBody">
                    <tr><td colspan="3" class="text-center">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/lib/bootstrap.bundle.min.js"></script>
<script src="/lib/lucide.min.js"></script>
<script src="/lib/motion.js"></script>
<script src="/js/animations.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui-maps.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/topbar.js"></script>
<script src="/js/router.js"></script>
<script src="/js/chart-modal.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
