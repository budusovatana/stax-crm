<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Инвестор — STAX</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div id="topbar"></div>
    <div class="container-fluid px-4 py-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="card-head">
                    <div>
                        <h1 class="h4 mb-1" id="title">Инвестор</h1>
                        <div class="text-muted" id="subtitle"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <a class="btn btn-outline-secondary" id="btnBack" href="/pages/investors.html"><i data-lucide="arrow-left"></i> Назад</a>
                        <a class="btn btn-warning" id="btnEdit" href="#"><i data-lucide="pencil"></i> Редактировать</a>
                    </div>
                </div>

                <div class="kv-grid mb-3">
                    <div class="kv-item"><div class="kv-label">Телефон</div><div class="kv-value" id="phone">—</div></div>
                    <div class="kv-item"><div class="kv-label">Email</div><div class="kv-value" id="email">—</div></div>
                    <div class="kv-item"><div class="kv-label">Паспорт</div><div class="kv-value" id="passport">—</div></div>
                    <div class="kv-item"><div class="kv-label">ИНН</div><div class="kv-value" id="inn">—</div></div>
                    <div class="kv-item"><div class="kv-label">Комментарий</div><div class="kv-value" id="comment">—</div></div>
                    <div class="kv-item"><div class="kv-label">Выплачено всего</div><div class="kv-value" id="paidTotal">—</div></div>
                </div>

                <hr />

                <div class="section-head">
                    <h2 class="h5 mb-0">Инвестиции</h2>
                    <a class="btn btn-warning btn-sm" id="btnAddInvestment" href="#"><i data-lucide="plus"></i> Добавить инвестицию</a>
                </div>
                <div class="table-responsive mt-2">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Машина</th>
                                <th class="text-end">Сумма</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="invTbody"></tbody>
                    </table>
                </div>

                <hr />

                <div class="section-head">
                    <h2 class="h5 mb-0">Договора и документы</h2>
                    <a class="btn btn-warning btn-sm" id="btnAddDoc" href="#"><i data-lucide="plus"></i> Добавить договор</a>
                </div>
                <div class="table-responsive mt-2">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Файл</th>
                                <th>Тип</th>
                                <th>№</th>
                                <th>Дата</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="docTbody"></tbody>
                    </table>
                </div>
                <div id="error" class="alert alert-danger mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>
    <script src="/lib/bootstrap.bundle.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
    <script src="/lib/motion.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui-maps.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/investor-view.js"></script>
</body>
</html>
