<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Отчеты — STAX</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div id="topbar"></div>
    <div class="container-fluid px-4 py-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-1">Отчеты</h1>
                <p class="text-muted mb-3">Выплаты за период</p>

                <div class="d-flex flex-wrap gap-3 align-items-end mb-3">
                    <div>
                        <label class="form-label">Дата с</label>
                        <input class="form-control" id="dateFrom" type="date" />
                    </div>
                    <div>
                        <label class="form-label">Дата по</label>
                        <input class="form-control" id="dateTo" type="date" />
                    </div>
                    <div>
                        <label class="form-label">Инвестор</label>
                        <select class="form-select" id="investorFilter">
                            <option value="">Все инвесторы</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-warning" id="btnRun"><i data-lucide="play"></i> Сформировать</button>
                        <button class="btn btn-outline-secondary" id="btnCsv"><i data-lucide="file-spreadsheet"></i> Скачать CSV</button>
                        <button class="btn btn-outline-secondary" id="btnPdf"><i data-lucide="file-down"></i> Скачать PDF</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Инвестор</th>
                                <th class="text-end">Сумма выплат</th>
                                <th class="text-end">Кол-во выплат</th>
                            </tr>
                        </thead>
                        <tbody id="tbody"></tbody>
                    </table>
                </div>
                <div id="error" class="alert alert-danger mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>
    <script src="/lib/bootstrap.bundle.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
    <script src="/lib/motion.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui-maps.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/reports.js"></script>
</body>
</html>
