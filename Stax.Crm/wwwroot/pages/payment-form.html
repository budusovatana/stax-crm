<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Добавить выплату</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div id="topbar"></div>
    <div class="container-fluid px-4 py-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="mb-3">Добавить выплату</h2>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Инвестиция</label>
                        <select class="form-select" id="investmentId"></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Дата</label>
                        <input class="form-control" id="paidAt" type="date" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Сумма</label>
                        <input class="form-control" id="amount" type="text" placeholder="100 000" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Номер договора (опц.)</label>
                        <input class="form-control" id="contractNo" />
                    </div>
                    <div class="col-12">
                        <label class="form-label">Комментарий</label>
                        <textarea class="form-control" id="comment"></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-warning" id="btnSave"><i data-lucide="save"></i> Сохранить</button>
                    <a class="btn btn-outline-secondary" id="btnBack" href="/pages/payments.html"><i data-lucide="arrow-left"></i> Назад</a>
                </div>
                <div id="error" class="alert alert-danger mt-3"></div>
            </div>
        </div>
    </div>
    <script src="/lib/bootstrap.bundle.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
    <script src="/lib/motion.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui-maps.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/payment-form.js"></script>
</body>
</html>
