<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Пользователь — редактирование</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div id="topbar"></div>
    <div class="container-fluid px-4 py-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="card-head">
                    <div>
                        <h1 class="h4 mb-1" id="h">Пользователь</h1>
                        <div class="text-muted" id="hint"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <a class="btn btn-outline-secondary" href="/pages/users.html"><i data-lucide="arrow-left"></i> Назад</a>
                        <button class="btn btn-warning" id="btnSave" type="button"><i data-lucide="save"></i> Сохранить</button>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Логин</label>
                        <input class="form-control" id="username" placeholder="username" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Отображаемое имя (опц.)</label>
                        <input class="form-control" id="displayName" placeholder="Иван Иванов" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" id="passwordLabel">Пароль</label>
                        <input class="form-control" id="password" type="password" placeholder="Минимум 8 символов" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Роль</label>
                        <select class="form-select" id="role">
                            <option value="ADMIN">Администратор</option>
                            <option value="ASSISTANT">Ассистент</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" id="isActive" checked />
                            <label class="form-check-label" for="isActive">Активен</label>
                        </div>
                    </div>
                </div>
                <div id="error" class="alert alert-danger mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>
    <script src="/lib/bootstrap.bundle.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
    <script src="/lib/motion.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui-maps.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/user-form.js"></script>
</body>
</html>
