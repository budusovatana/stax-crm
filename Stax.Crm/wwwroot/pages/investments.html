<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Инвестиции — STAX</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div id="topbar"></div>
    <div class="container-fluid px-4 py-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h2 class="mb-0">Инвестиции</h2>
                    <div class="d-flex gap-2 align-items-center flex-wrap">
                        <input class="form-control" id="q" placeholder="Поиск по инвестору/машине..." style="max-width:250px; flex:1; min-width:120px;" />
                        <select class="form-select" id="investorFilter" style="width:auto;">
                            <option value="">Все инвесторы</option>
                        </select>
                        <select class="form-select" id="statusFilter" style="width:auto;">
                            <option value="">Все статусы</option>
                            <option value="ACTIVE">Активная</option>
                            <option value="CLOSED">Закрыта</option>
                            <option value="CANCELED">Отменена</option>
                        </select>
                        <a class="btn btn-warning" href="/pages/investment-form.html"><i data-lucide="plus"></i> Добавить</a>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Инвестор</th>
                                <th>Машина</th>
                                <th>Сумма</th>
                                <th>Статус</th>
                                <th style="width:200px;">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="tbody"></tbody>
                    </table>
                </div>
                <div id="error" class="alert alert-danger mt-3"></div>
            </div>
        </div>
    </div>
    <script src="/lib/bootstrap.bundle.min.js"></script>
    <script src="/lib/lucide.min.js"></script>
    <script src="/lib/motion.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui-maps.js"></script>
    <script src="/js/modal.js"></script>
    <script src="/js/topbar.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/investments.js"></script>
</body>
</html>
